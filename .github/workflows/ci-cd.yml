# Integración y despliegue continuos.
#
# CI: backend y frontend se analizan en paralelo (jobs independientes). En un pull request solo
# corren estos dos jobs; los pasos de publicación se omiten.
#
# CD: al hacer push a main, si AMBOS jobs de CI terminan correctamente, se construyen y publican las
# imágenes Docker de backend y frontend en GitHub Packages (ghcr.io). El job de publicación declara
# `needs: [backend, frontend]`, así que si cualquiera de los dos falla, la publicación se omite y el
# despliegue no continúa.
#
# Configuración requerida en el repositorio (Settings → Secrets and variables → Actions → Secrets):
#     SONAR_TOKEN                 Token de SonarCloud (SonarQube Cloud).
#     SONAR_ORGANIZATION          Organización en SonarCloud.
#     SONAR_PROJECT_KEY_BACKEND   Project key del proyecto backend en SonarCloud.
#     SONAR_PROJECT_KEY_FRONTEND  Project key del proyecto frontend en SonarCloud.
# La publicación usa el GITHUB_TOKEN integrado (no requiere secreto adicional). Verifica que en
# Settings → Actions → General → Workflow permissions esté habilitado "Read and write permissions".
name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    # despliegue_continuo se incluye temporalmente para probar el CD sin integrar a main.
    branches: [main, despliegue_continuo]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify formatting
        working-directory: src/backend
        run: dotnet format EventosVivos.sln --verify-no-changes

      - name: Setup Java (requerido por SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install QuestPDF native dependencies (SkiaSharp)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1

      - name: Build, test and analyze
        working-directory: src/backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY_BACKEND }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/RabbitMqEventBus.cs,**/RabbitMqEventStreamConsumer.cs,**/OutboxPublisherService.cs,**/ReservationExpirationService.cs,**/EventCompletionService.cs"
          dotnet build EventosVivos.sln -c Release
          dotnet test EventosVivos.sln -c Release --no-build \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        working-directory: src/frontend
        run: pnpm install --frozen-lockfile

      - name: Verify formatting
        working-directory: src/frontend
        run: pnpm exec prettier --check .

      - name: Test with coverage
        working-directory: src/frontend
        run: pnpm exec ng test --watch=false --coverage --coverage-reporters=lcovonly

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: src/frontend
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_FRONTEND }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # CD: solo en push a main y solo si backend Y frontend pasaron (needs). En PR este job no corre.
  publish-images:
    name: Publish images (GHCR)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/despliegue_continuo')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Namespace en minúscula (requisito de GHCR)
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/eventosvivos-backend:latest
            ghcr.io/${{ steps.ns.outputs.owner }}/eventosvivos-backend:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/eventosvivos-frontend:latest
            ghcr.io/${{ steps.ns.outputs.owner }}/eventosvivos-frontend:${{ github.sha }}
