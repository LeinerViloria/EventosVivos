<p-toast />

<div class="flex min-h-[70vh] items-center justify-center">
  <form
    [formGroup]="form"
    class="flex w-full max-w-sm flex-col gap-5 rounded-2xl border border-surface-700 bg-surface-900 p-8"
  >
    <header class="flex flex-col gap-1">
      <h1 class="text-2xl font-semibold">{{ 'labels.auth.login.title' | transloco }}</h1>
      <p class="text-sm text-surface-400">{{ 'labels.auth.login.subtitle' | transloco }}</p>
    </header>

    <p-fluid class="flex flex-col gap-5">
      <app-field
        for="email"
        [label]="'labels.auth.email' | transloco"
        [showError]="showError('email')"
        [errorText]="'errors.AUTH_EMAIL_INVALID' | transloco"
      >
        <input
          id="email"
          pInputText
          type="email"
          formControlName="email"
          [invalid]="showError('email')"
        />
      </app-field>

      <app-field
        for="password"
        [label]="'labels.auth.password' | transloco"
        [showError]="showError('password')"
        [errorText]="'errors.AUTH_PASSWORD_REQUIRED' | transloco"
      >
        <p-password
          inputId="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          [invalid]="showError('password')"
        />
      </app-field>
    </p-fluid>

    <p-button
      [label]="'labels.auth.submit' | transloco"
      icon="pi pi-sign-in"
      [loading]="submitting()"
      (onClick)="submit()"
    />

    <a routerLink="/register" class="text-center text-sm text-primary no-underline">
      {{ 'labels.auth.register.link' | transloco }}
    </a>
  </form>
</div>
