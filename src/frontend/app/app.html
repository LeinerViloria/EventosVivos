<div class="min-h-screen bg-surface-950 text-surface-0">
  <header class="flex items-center justify-between border-b border-surface-800 px-6 py-3">
    <a routerLink="/" class="flex items-center gap-2 text-surface-0 no-underline">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary">
        <i class="pi pi-calendar text-white"></i>
      </span>
      <span class="text-lg font-semibold">Eventos <span class="text-primary">vivos</span></span>
    </a>

    @if (auth.isAuthenticated()) {
      <div class="flex items-center gap-2">
        <span class="mr-2 text-sm text-surface-300">
          {{ 'labels.auth.greeting' | transloco: { name: auth.user()?.name } }}
        </span>
        <p-button
          [label]="'labels.nav.home' | transloco"
          icon="pi pi-home"
          severity="secondary"
          [text]="true"
          (onClick)="goHome()"
        />
        <p-button
          [label]="'labels.auth.logout' | transloco"
          icon="pi pi-sign-out"
          severity="secondary"
          [text]="true"
          (onClick)="logout()"
        />
      </div>
    }
  </header>

  <main class="px-6 py-8">
    <router-outlet />
  </main>
</div>
