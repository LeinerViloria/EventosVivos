services:
  postgres:
    image: postgres:18.4-bookworm
    env_file: ./src/backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - eventosvivos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file: ./src/backend/.env
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "6380:6379"
    networks:
      - eventosvivos
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    env_file: ./src/backend/.env
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - eventosvivos
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./src/backend
    env_file: ./src/backend/.env
    ports:
      - "8080:8080"
    networks:
      - eventosvivos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: ./src/frontend
    env_file: ./src/frontend/.env
    ports:
      - "4200:80"
    networks:
      - eventosvivos
    depends_on:
      - api

networks:
  eventosvivos:
    driver: bridge

volumes:
  postgres-data:
